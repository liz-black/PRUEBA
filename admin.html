<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Docente - Trivia</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
background:linear-gradient(135deg,#46178f,#7b1fa2,#e21b3c);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.card{
width:100%;
max-width:720px;
background:#fff;
border-radius:18px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{text-align:center;margin-bottom:25px;color:#46178f}

label{display:block;margin-top:14px;margin-bottom:6px;font-weight:bold}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#46178f;
color:#fff;
font-size:18px;
cursor:pointer;
}

button:hover{opacity:.95}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
color:#0a7a22;
}

img{
margin-top:10px;
max-width:100%;
border-radius:10px;
display:none;
}

.topbar{
text-align:right;
font-size:14px;
margin-bottom:10px;
color:#46178f;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
👨‍🏫 Docente: <span id="usuario"></span>
</div>

<h1>Panel Docente</h1>

<label>Pregunta</label>
<input id="pregunta">

<label>Imagen (URL)</label>
<input id="imagen" oninput="preview()">
<img id="vista">

<div class="grid">

<div>
<label>Opción A</label>
<input id="a">
</div>

<div>
<label>Opción B</label>
<input id="b">
</div>

<div>
<label>Opción C</label>
<input id="c">
</div>

<div>
<label>Opción D</label>
<input id="d">
</div>

</div>

<label>Respuesta correcta</label>
<select id="correcta">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<div class="grid">

<div>
<label>Estado</label>
<select id="estado">
<option value="Activa">Activa</option>
<option value="Inactiva">Inactiva</option>
</select>
</div>

<div>
<label>Tiempo (segundos)</label>
<input id="tiempo" type="number" value="30">
</div>

</div>

<button onclick="guardar()">💾 Guardar Trivia</button>

<div id="msg"></div>

</div>

<script>

// =========================
// PROTECCIÓN DE ACCESO
// =========================
if(sessionStorage.getItem("docente") !== "true"){
alert("Acceso denegado");
location.href = "login.html";
}

// mostrar usuario
document.getElementById("usuario").innerText =
sessionStorage.getItem("usuario") || "Docente";

// =========================
// CONFIG
// =========================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu7rKYIK5VYI8nSHDtiSn9HqzhGkpb5H5nFuj3dOKjQgRX2li8kbAum8R53tfTnIJikQ/exec";

// =========================
// PREVIEW IMAGEN
// =========================
function preview(){
const url=document.getElementById("imagen").value.trim();
const img=document.getElementById("vista");

if(url){
img.src=url;
img.style.display="block";
}else{
img.style.display="none";
}
}

// =========================
// GUARDAR TRIVIA
// =========================
async function guardar(){

const datos=new URLSearchParams({
accion:"guardarTrivia",
pregunta:pregunta.value,
imagen:imagen.value,
a:a.value,
b:b.value,
c:c.value,
d:d.value,
correcta:correcta.value,
estado:estado.value,
tiempo:tiempo.value
});

try{

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:datos
});

const res=await r.json();

if(res.ok){
msg.innerHTML="✅ Trivia guardada correctamente.";
}else{
msg.innerHTML="❌ No se pudo guardar.";
}

}catch(e){
msg.innerHTML="❌ Error de conexión.";
}

}

</script>

</body>
</html>
