<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Docente - Trivia</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
background:linear-gradient(135deg,#46178f,#7b1fa2,#e21b3c);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.card{
width:100%;
max-width:720px;
background:#fff;
border-radius:18px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{text-align:center;margin-bottom:25px;color:#46178f}

label{display:block;margin-top:14px;margin-bottom:6px;font-weight:bold}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#46178f;
color:#fff;
font-size:18px;
cursor:pointer;
}

button:hover{opacity:.95}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
color:#0a7a22;
}

img{
margin-top:10px;
max-width:100%;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Panel Docente</h1>

<label>Pregunta</label>
<input id="pregunta">

<label>Imagen (URL)</label>
<input id="imagen" oninput="preview()">
<img id="vista">

<div class="grid">

<div>
<label>Opción A</label>
<input id="a">
</div>

<div>
<label>Opción B</label>
<input id="b">
</div>

<div>
<label>Opción C</label>
<input id="c">
</div>

<div>
<label>Opción D</label>
<input id="d">
</div>

</div>

<label>Respuesta correcta</label>
<select id="correcta">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<div class="grid">

<div>
<label>Estado</label>
<select id="estado">
<option>Activa</option>
<option>Inactiva</option>
</select>
</div>

<div>
<label>Tiempo (segundos)</label>
<input id="tiempo" type="number" value="30">
</div>

</div>

<button onclick="guardar()">Guardar Trivia</button>

<div id="msg"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

// =========================
// PREVIEW IMAGEN
// =========================
function preview(){
const url = imagen.value.trim();
if(url){
vista.src = url;
vista.style.display = "block";
}else{
vista.style.display = "none";
}
}

// =========================
// GUARDAR TRIVIA
// =========================
async function guardar(){

msg.innerHTML = "Guardando...";

const datos = new URLSearchParams();

datos.append("accion","guardarTrivia");
datos.append("pregunta",pregunta.value);
datos.append("imagen",imagen.value);
datos.append("a",a.value);
datos.append("b",b.value);
datos.append("c",c.value);
datos.append("d",d.value);
datos.append("correcta",correcta.value);

await fetch(SCRIPT_URL,{
  method:"POST",
  mode:"no-cors",
  body:datos
});

msg.innerHTML = "✅ Guardado correctamente (reemplaza pregunta)";
}

try{

await fetch(SCRIPT_URL, {
method:"POST",
mode:"no-cors",
body:datos
});

// ⚠️ no se puede leer respuesta en GitHub Pages
msg.innerHTML = "✅ Pregunta guardada correctamente (reemplazada)";

pregunta.value="";
imagen.value="";
a.value="";
b.value="";
c.value="";
d.value="";

}catch(e){

console.log(e);
msg.innerHTML = "❌ Error de conexión";

}

}

</script>

</body>
</html>
