<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Trivia</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#46178f,#e21b3c);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:600px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

label{
font-size:14px;
opacity:.9;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#111;
color:white;
font-size:18px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.row{
display:flex;
gap:10px;
}

.row input{
flex:1;
}

.status{
display:flex;
gap:10px;
margin-top:10px;
}

.status label{
flex:1;
text-align:center;
background:rgba(0,0,0,.2);
padding:10px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>👨‍🏫 PANEL DOCENTE</h2>

<label>Pregunta</label>
<input id="pregunta" placeholder="Escribe la pregunta">

<label>URL Imagen</label>
<input id="imagen" placeholder="https://...">

<div class="row">
<input id="opA" placeholder="Opción A">
<input id="opB" placeholder="Opción B">
</div>

<div class="row">
<input id="opC" placeholder="Opción C">
<input id="opD" placeholder="Opción D">
</div>

<label>Respuesta correcta</label>
<select id="correcta">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<label>Tiempo (segundos)</label>
<input id="tiempo" type="number" value="300">

<label>Estado</label>
<div class="status">
<label><input type="radio" name="estado" value="Activa" checked> Activa</label>
<label><input type="radio" name="estado" value="Inactiva"> Inactiva</label>
</div>

<button onclick="guardar()">💾 Guardar Trivia</button>

<p id="msg" style="text-align:center;margin-top:10px;"></p>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwnRz0jHfErkG7GrljCaT9FEmz3HMsjWz1u8VqhXV7wb_Ai9AMABEJJkGRojw1c3ICaJQ/exec";

async function guardar(){

const data={
pregunta:document.getElementById("pregunta").value,
imagen:document.getElementById("imagen").value,
a:document.getElementById("opA").value,
b:document.getElementById("opB").value,
c:document.getElementById("opC").value,
d:document.getElementById("opD").value,
correcta:document.getElementById("correcta").value,
tiempo:document.getElementById("tiempo").value,
estado:document.querySelector('input[name="estado"]:checked').value
};

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({
accion:"guardarTrivia",
...data
})
});

const r=await res.json();

document.getElementById("msg").innerText="✔ Guardado correctamente";

}

</script>

</body>
</html>
