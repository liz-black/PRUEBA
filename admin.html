<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Trivia</title>

<style>
body{font-family:Arial;background:#46178f;color:#fff;margin:0;padding:20px}
.card{background:#fff;color:#000;padding:20px;border-radius:12px;max-width:600px;margin:auto}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:15px;background:#111;color:#fff;border:none;margin-top:10px;cursor:pointer}
img{max-width:100%;display:none;margin-top:10px;border-radius:10px}
#msg{margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="card">

<h2>Panel Admin</h2>

<label>Pregunta</label>
<input id="pregunta">

<label>Imagen</label>
<input id="imagen" oninput="preview()">
<img id="vista">

<div>
<label>A</label><input id="a">
<label>B</label><input id="b">
<label>C</label><input id="c">
<label>D</label><input id="d">
</div>

<label>Correcta</label>
<select id="correcta">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<button onclick="guardar()">Guardar</button>

<div id="msg"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

// 🔥 PREVIEW (CORRECTO)
function preview(){
const url = document.getElementById("imagen").value;
const img = document.getElementById("vista");

if(url){
img.src = url;
img.style.display = "block";
}else{
img.style.display = "none";
}
}

// 🔥 GUARDAR (SIN await ERROR)
async function guardar(){

const msg = document.getElementById("msg");
msg.innerText = "Guardando...";

const datos = new URLSearchParams();
datos.append("accion","guardarTrivia");
datos.append("pregunta",document.getElementById("pregunta").value);
datos.append("imagen",document.getElementById("imagen").value);
datos.append("a",document.getElementById("a").value);
datos.append("b",document.getElementById("b").value);
datos.append("c",document.getElementById("c").value);
datos.append("d",document.getElementById("d").value);
datos.append("correcta",document.getElementById("correcta").value);

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:datos
});

msg.innerText = "✅ Guardado (reemplazado en Sheets)";
}

</script>

</body>
</html>
