<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Trivia</title>

<style>
body{
font-family:Arial;
background:#46178f;
color:#fff;
margin:0;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{text-align:center}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
background:#111;
color:#fff;
border:none;
margin-top:10px;
cursor:pointer;
border-radius:10px;
font-size:16px;
}

button:hover{opacity:.9}

img{
max-width:100%;
display:none;
margin-top:10px;
border-radius:10px;
}

#msg{
margin-top:10px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h2>👨‍🏫 Panel Admin Trivia</h2>

<label>Pregunta</label>
<input id="pregunta">

<label>Imagen</label>
<input id="imagen" oninput="preview()">
<img id="vista">

<label>A</label>
<input id="a">

<label>B</label>
<input id="b">

<label>C</label>
<input id="c">

<label>D</label>
<input id="d">

<label>Correcta</label>
<select id="correcta">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<button onclick="guardar()">GUARDAR TRIVIA</button>

<div id="msg"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

// ========================
// PREVIEW IMAGEN
// ========================
function preview(){

const url = document.getElementById("imagen").value.trim();
const img = document.getElementById("vista");

if(url){
img.src = url;
img.style.display = "block";
}else{
img.style.display = "none";
}

}

// ========================
// GUARDAR TRIVIA
// ========================
async function guardar(){

const form = new URLSearchParams();

form.append("accion","guardarTrivia");
form.append("pregunta",document.getElementById("pregunta").value);
form.append("imagen",document.getElementById("imagen").value);
form.append("a",document.getElementById("a").value);
form.append("b",document.getElementById("b").value);
form.append("c",document.getElementById("c").value);
form.append("d",document.getElementById("d").value);
form.append("correcta",document.getElementById("correcta").value);

document.getElementById("msg").innerText = "Guardando...";

try{

const res = await fetch(SCRIPT_URL,{
method:"POST",
body:form
});

const text = await res.text();

if(text.includes("true") || text.includes("ok") || text.includes("saved")){
document.getElementById("msg").innerText = "✅ Guardado correctamente";
}else{
document.getElementById("msg").innerText = "⚠️ Respuesta: " + text;
}

}catch(e){
document.getElementById("msg").innerText = "❌ Error de conexión";
console.log(e);
}

}

</script>

</body>
</html>
