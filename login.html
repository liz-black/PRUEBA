<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Docente</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#46178f,#e21b3c);
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<h2>👨‍🏫 Login Docente</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<div id="error"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

async function login(){

const user = document.getElementById("user").value.trim();
const pass = document.getElementById("pass").value.trim();
const error = document.getElementById("error");

error.innerText = "";

if(!user || !pass){
error.innerText = "Completa todos los campos";
return;
}

try{

// 🚨 IMPORTANTE: no-cors (evita bloqueo CORS)
await fetch(SCRIPT_URL, {
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
accion:"loginDocente",
usuario:user,
contrasena:pass
})
});

// ⚠️ no se puede leer respuesta, asumimos éxito si no explota
sessionStorage.setItem("docente","true");
sessionStorage.setItem("usuario",user);

location.href = "admin.html";

}catch(e){
console.log(e);
error.innerText = "Error de conexión con el servidor";
}

}

</script>

</body>
</html>
