<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Kahoot Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#46178f,#e21b3c);
color:white;
height:100vh;
overflow:hidden;
}

.timer{
position:absolute;
top:10px;
right:15px;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,.3);
padding:8px 14px;
border-radius:20px;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
}

.content{
margin-top:auto;
display:flex;
flex-direction:column;
align-items:center;
}

img{
width:96%;
max-width:850px;
height:320px;
border-radius:16px;
object-fit:cover;
margin-bottom:12px;
box-shadow:0 4px 20px rgba(0,0,0,.25);
}

.question{
font-size:34px;
font-weight:bold;
text-align:center;
margin:10px;
}

.options{
height:48vh;
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:8px;
padding:10px;
box-sizing:border-box;
}

.option{
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
border-radius:16px;
cursor:pointer;
user-select:none;
}

.red{background:#e21b3c}
.blue{background:#1368ce}
.green{background:#26890c}
.yellow{background:#e9b000;color:#000}

#result{
text-align:center;
font-size:20px;
margin:10px;
font-weight:bold;
}

.final{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.final h1{font-size:40px;margin-bottom:10px}
.final h2{opacity:.8}
.final .score{font-size:70px;font-weight:bold;color:#FFD54F}

.rank{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="timer" id="timer">--</div>

<div class="container">

<div class="content">

<img id="img">

<div class="question" id="question">Cargando...</div>

</div>

<div class="options" id="options"></div>

<div id="result"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

let tiempo = 0;
let intervalo;
let pregunta = null;
let respondido = false;
let puntajeTotal = 0;

const nombre = sessionStorage.getItem("nombre");
const dni = sessionStorage.getItem("dni");

// =======================
// CARGAR PREGUNTA
// =======================
async function cargar(){

const conf = await fetch(SCRIPT_URL+"?accion=configuracion").then(r=>r.json());

if(!conf.ok || conf.estado !== "Activa"){
document.body.innerHTML = "<h1 style='text-align:center;margin-top:40vh'>⛔ Trivia no activa</h1>";
return;
}

tiempo = parseInt(conf.tiempo || 30);
startTimer();

const data = await fetch(SCRIPT_URL+"?accion=pregunta").then(r=>r.json());

if(!data.ok) return;

pregunta = data;

document.getElementById("img").src = data.imagen || "";
document.getElementById("question").innerText = data.pregunta;

const colores = ["red","blue","green","yellow"];
const letras = ["A","B","C","D"];
const textos = [data.a,data.b,data.c,data.d];

const options = document.getElementById("options");
options.innerHTML = "";

textos.forEach((t,i)=>{

const div = document.createElement("div");
div.className = "option "+colores[i];
div.innerText = letras[i]+") "+t;

div.onclick = ()=> responder(letras[i]);

options.appendChild(div);

});

}

// =======================
// TIMER
// =======================
function startTimer(){

clearInterval(intervalo);

document.getElementById("timer").innerText = tiempo;

intervalo = setInterval(()=>{

tiempo--;
document.getElementById("timer").innerText = tiempo;

if(tiempo<=0){
clearInterval(intervalo);
bloquear();
}

},1000);

}

// =======================
// BLOQUEAR
// =======================
function bloquear(){

respondido = true;

document.querySelectorAll(".option").forEach(o=>{
o.style.pointerEvents="none";
o.style.opacity="0.6";
});

}

// =======================
// RESPONDER
// =======================
async function responder(opcion){

if(respondido) return;

respondido = true;
clearInterval(intervalo);

let puntos = 0;

if(opcion === pregunta.correcta){
puntos = 1;
}

puntajeTotal += puntos;

document.getElementById("result").innerText =
puntos ? "✅ Correcto" : "❌ Incorrecto";

// guardar
await fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({
accion:"guardarResultado",
nombre:nombre,
dni:dni,
puntaje:puntos,
tiempo:tiempo
})
});

bloquear();

// mostrar final + ranking
setTimeout(()=>finalScreen(),1200);

}

// =======================
// FINAL SCREEN + RANKING
// =======================
async function finalScreen(){

const res = await fetch(SCRIPT_URL+"?accion=ranking").then(r=>r.json());

let rankHTML = "";

if(res.ok){
res.ranking.forEach((r,i)=>{
rankHTML += `<div>${i+1}. ${r.nombre} - ${r.puntaje}</div>`;
});
}

document.body.innerHTML = `
<div class="final">
<h1>🎉 ¡Terminado!</h1>
<h2>${nombre}</h2>
<div class="score">${puntajeTotal}</div>

<div class="rank">
<h3>🏆 TOP 10</h3>
${rankHTML}
</div>
</div>
`;

}

// iniciar
cargar();

</script>

</body>
</html>
