<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: white;
    }

    .A { background: #ff4d4d; }
    .B { background: #4d79ff; }
    .C { background: #4dff88; }
    .D { background: #ffd24d; }

    #timer {
      font-size: 20px;
      margin-bottom: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="card">

    <h2>🎮 TRIVIA ZULEN</h2>

    <div id="timer">⏳ 00</div>

    <p id="pregunta">Cargando pregunta...</p>

    <button class="A" onclick="responder('A')">A</button>
    <button class="B" onclick="responder('B')">B</button>
    <button class="C" onclick="responder('C')">C</button>
    <button class="D" onclick="responder('D')">D</button>

    <p id="result"></p>

  </div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydDWKZeSXHQesgay6WydQvD140EFW2Uo73edhbjW6p7YhnQsvjE4x1jkEJYGpZGqYcnA/exec";

let tiempo = 0;
let intervalo;
let preguntaActual = null;

// ==========================
// CARGAR CONFIG + PREGUNTA
// ==========================
async function cargarJuego() {

  try {

    const confRes = await fetch(SCRIPT_URL + "?accion=configuracion");
    const conf = await confRes.json();

    if (!conf.ok || conf.estado !== "Activa") {
      document.getElementById("pregunta").innerText = "⛔ Trivia no activa";
      return;
    }

    tiempo = parseInt(conf.tiempo || 30);
    iniciarTimer();

    const pregRes = await fetch(SCRIPT_URL + "?accion=pregunta");
    const data = await pregRes.json();

    if (!data.ok) return;

    preguntaActual = data;

    document.getElementById("pregunta").innerText = data.pregunta;

    document.querySelector(".A").innerText = "A) " + data.a;
    document.querySelector(".B").innerText = "B) " + data.b;
    document.querySelector(".C").innerText = "C) " + data.c;
    document.querySelector(".D").innerText = "D) " + data.d;

  } catch (e) {
    document.getElementById("result").innerText = "❌ Error de conexión";
  }
}

// ==========================
// TIMER
// ==========================
function iniciarTimer() {

  document.getElementById("timer").innerText = "⏳ " + tiempo;

  intervalo = setInterval(() => {

    tiempo--;
    document.getElementById("timer").innerText = "⏳ " + tiempo;

    if (tiempo <= 0) {
      clearInterval(intervalo);
      bloquear();
    }

  }, 1000);
}

// ==========================
// BLOQUEAR
// ==========================
function bloquear() {

  document.querySelectorAll("button").forEach(b => {
    b.disabled = true;
  });

  document.getElementById("result").innerText = "⛔ Tiempo terminado";
}

// ==========================
// RESPONDER
// ==========================
async function responder(opcion) {

  clearInterval(intervalo);

  const nombre = sessionStorage.getItem("nombre");
  const dni = sessionStorage.getItem("dni");

  if (!nombre || !dni) {
    alert("Datos no encontrados. Vuelve a iniciar.");
    location.href = "index.html";
    return;
  }

  document.querySelectorAll("button").forEach(b => b.disabled = true);

  // calcular puntaje
  let puntaje = 0;

  if (preguntaActual && opcion === preguntaActual.correcta) {
    puntaje = 1;
  }

  const datos = new URLSearchParams({
    accion: "guardarResultado",
    nombre: nombre,
    dni: dni,
    puntaje: puntaje,
    tiempo: tiempo
  });

  try {

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: datos
    });

    const json = await res.json();

    if (json.ok) {
      document.getElementById("result").innerText =
        puntaje ? "✅ Correcto +1 punto" : "❌ Incorrecto";
    } else {
      document.getElementById("result").innerText = "❌ Error al guardar";
    }

  } catch (e) {
    document.getElementById("result").innerText = "❌ Error de servidor";
  }
}

// iniciar
cargarJuego();

</script>

</body>
</html>
