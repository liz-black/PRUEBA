<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
        padding: 20px;
      }

      .card {
        max-width: 600px;
        margin: auto;
        background: #1e1e1e;
        padding: 20px;
        border-radius: 12px;
      }

      button {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .A { background: #ff4d4d; }
      .B { background: #4d79ff; }
      .C { background: #4dff88; }
      .D { background: #ffd24d; }

      #timer {
        font-size: 20px;
        margin-bottom: 10px;
      }

      #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
      }

    </style>
  </head>

  <body>

    <div class="card">

      <h2>🎮 TRIVIA ZULEN</h2>

      <div id="timer">⏳ 00</div>

      <p id="pregunta">Cargando pregunta...</p>

      <button class="A" onclick="responder('A')">A</button>
      <button class="B" onclick="responder('B')">B</button>
      <button class="C" onclick="responder('C')">C</button>
      <button class="D" onclick="responder('D')">D</button>

      <p id="result"></p>

    </div>

    <script>

      let tiempo = 30;
      let intervalo;

      function iniciarTimer() {
        intervalo = setInterval(() => {
          tiempo--;
          document.getElementById("timer").innerText = "⏳ " + tiempo;

          if (tiempo <= 0) {
            clearInterval(intervalo);
            bloquear();
          }

        }, 1000);
      }

      function bloquear() {
        document.querySelectorAll("button").forEach(b => {
          b.disabled = true;
        });

        document.getElementById("result").innerText = "⛔ Tiempo terminado";
      }

      function cargarPregunta() {
        google.script.run.withSuccessHandler(function(data) {

          document.getElementById("pregunta").innerText =
            data.pregunta;

          document.querySelector(".A").innerText = "A) " + data.A;
          document.querySelector(".B").innerText = "B) " + data.B;
          document.querySelector(".C").innerText = "C) " + data.C;
          document.querySelector(".D").innerText = "D) " + data.D;

          iniciarTimer();

        }).getPreguntaActiva();
      }

      function responder(opcion) {

        clearInterval(intervalo);

        let nombre = prompt("Ingresa tu nombre:");
        let dni = prompt("Ingresa tu DNI:");

        google.script.run.withSuccessHandler(function(res) {
          document.getElementById("result").innerText = res;

          bloquear();

        }).guardarResultado({
          nombre: nombre,
          dni: dni,
          respuesta: opcion
        });
      }

      cargarPregunta();

    </script>

  </body>
</html>
